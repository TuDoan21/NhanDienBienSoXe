Global:
  use_gpu: false # TẮT GPU VÌ CHẠY BẰNG CPU I7
  epoch_num: 50  # Chạy 50 vòng
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: ./output/v3_en_mobile_cpu # Nơi lưu kết quả
  save_epoch_step: 10
  eval_batch_step: [0, 50]
  cal_metric_during_train: True
  pretrained_model: ./en_PP-OCRv3_rec_train/best_accuracy # Bộ não gốc
  checkpoints:
  save_inference_dir:
  use_visualdl: False
  infer_img:
  character_dict_path: ppocr/utils/en_dict.txt # Từ điển Tiếng Anh/Số
  max_text_length: 25
  infer_mode: False
  use_space_char: False
  save_res_path: ./output/predicts_rec.txt

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.001
  regularizer:
    name: 'L2'
    factor: 0.00001

Architecture:
  model_type: rec
  algorithm: SVTR
  Transform:
  Backbone:
    name: MobileNetV1Enhance
    scale: 0.5
    last_conv_stride: [1, 2]
    last_pool_type: avg
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 64
            depth: 2
            hidden_dims: 120
            use_guide: True
          Head:
            fc_decay: 0.00001
      - SARHead:
          enc_mac_exp: 1
          dec_mac_exp: 2

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - SARLoss:

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data/crop_results/ # Đường dẫn ảnh
    label_file_list: ["./train_data/crop_results/label.txt"] # Đường dẫn nhãn
    ext_op_transform_idx: 1
    transforms:
      - DecodeImage: # load image
          img_mode: BGR
          channel_first: False
      - RecConAug:
          prob: 0.5
          ext_data_num: 2
          image_shape: [48, 320, 3]
      - RecAug:
      - MultiLabelEncode:
      - RecResizeImg:
          image_shape: [3, 48, 320]
      - KeepKeys:
          keep_keys: ['image', 'label_ctc', 'label_sar', 'length', 'valid_ratio']
  loader:
    shuffle: True
    drop_last: False
    batch_size_per_card: 16 # RAM em 16GB để mức 16 là an toàn
    num_workers: 0 # QUAN TRỌNG: Phải để 0 trên Windows để tránh lỗi đa luồng

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./train_data/crop_results/
    label_file_list: ["./train_data/crop_results/label.txt"]
    transforms:
      - DecodeImage: # load image
          img_mode: BGR
          channel_first: False
      - MultiLabelEncode:
      - RecResizeImg:
          image_shape: [3, 48, 320]
      - KeepKeys:
          keep_keys: ['image', 'label_ctc', 'label_sar', 'length', 'valid_ratio']
  loader:
    shuffle: False
    drop_last: False
    batch_size_per_card: 16
    num_workers: 0